services:
  laravel-app:
    build:
      context: ./laravel
    ports:
      - "127.0.0.1:18100:8000"
    environment:
      APP_NAME: HeadCracker
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://headcracker.jeremyfabiano.com
      LOG_CHANNEL: stderr
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      CACHE_STORE: database
      SESSION_DRIVER: database
      SESSION_ENCRYPT: "true"
      SESSION_DOMAIN: ".headcracker.jeremyfabiano.com"
      SESSION_SECURE_COOKIE: "true"
      QUEUE_CONNECTION: database
      HEADCRACKER_ENGINE_HTTP: http://engine:8000
      HEADCRACKER_ENGINE_WS_PUBLIC: wss://headcracker.jeremyfabiano.com
      HEADCRACKER_DEMO_GUEST_ID: HC-DEMO-LOCAL
    depends_on:
      - engine

  engine:
    build:
      context: ./engine
    ports:
      - "127.0.0.1:18101:8000"
    environment:
      HF_HOME: /cache/huggingface
      TORCH_HOME: /cache/torch
    volumes:
      - hf-cache:/cache/huggingface
      - torch-cache:/cache/torch

volumes:
  hf-cache:
  torch-cache:

networks:
  default:
    ipam:
      config:
        - subnet: 10.252.0.0/24
